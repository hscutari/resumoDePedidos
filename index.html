<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Resumo de Pedidos</title>
<style>
  :root{
    --shopee:#ee4d2d; --rapida:#2563eb; --bg:#f5f6f8; --card:#fff;
    --line:#e5e7eb; --txt:#1f2937; --muted:#6b7280;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:linear-gradient(135deg,#111827,#1f2937);color:var(--txt);padding:20px}
  .card{background:var(--card);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.35);
        width:100%;max-width:360px;padding:32px 28px}
  .card h1{margin:0 0 4px;font-size:22px}
  .card p{margin:0 0 22px;color:var(--muted);font-size:13px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;
        font-size:14px;background:#fff}
  input:focus{outline:none;border-color:var(--rapida);box-shadow:0 0 0 3px #2563eb22}
  button{width:100%;margin-top:22px;border:0;border-radius:9px;padding:12px;
         font-size:15px;font-weight:700;color:#fff;background:#111827;cursor:pointer}
  button:hover{background:#000}
</style>
</head>
<body>
  <form class="card" id="loginForm">
    <h1>Resumo de Pedidos</h1>
    <p>Entre para acessar o painel de produção.</p>

    <label for="user">Usuário</label>
    <input type="text" id="user" name="user" autocomplete="username" placeholder="seu usuário">

    <label for="pass">Senha</label>
    <input type="password" id="pass" name="pass" autocomplete="current-password" placeholder="sua senha">

    <button type="submit">Entrar</button>
  </form>

<script>
  // Sem validação por enquanto: ao enviar, vai direto para o resumo de vendas.
  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    window.location.href = "relatorio_pedidos.html";
  });
</script>
</body>
</html>
