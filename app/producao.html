<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produção — Distribuição nas impressoras</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --rapida:#6d5efc; --bg:#eef1f7; --canvas:#f7f8fc; --card:#fff; --line:#eceef4;
    --txt:#1a1d29; --muted:#7c8398; --accent:#6d5efc; --accent2:#9b8cff;
    --shadow:0 10px 30px rgba(31,38,72,.08);
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       margin:0;background:var(--bg);color:var(--txt)}

  /* ===== Shell fintech: rail + content ===== */
  .wrap{display:flex;min-height:100vh}
  .rail{flex:0 0 92px;background:var(--card);border-right:1px solid var(--line);
        display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 0;position:sticky;top:0;height:100vh}
  .brand{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;
         background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;
         box-shadow:0 8px 18px rgba(109,94,252,.45);margin-bottom:6px;font-size:15px}
  .nav{display:flex;flex-direction:column;gap:14px;align-items:center;flex:1}
  .nav a,.nav button{position:relative;width:52px;height:52px;border-radius:50%;display:grid;place-items:center;
         background:#f1f2f8;color:#5b6276;font-size:20px;text-decoration:none;cursor:pointer;transition:.15s;border:2px solid transparent}
  .nav a:hover,.nav button:hover{background:#e7e9f6;color:var(--accent)}
  .nav a.active{background:#fff;color:var(--accent);border-color:var(--accent);box-shadow:0 8px 18px rgba(109,94,252,.25)}
  .nav a .lbl,.nav button .lbl{position:absolute;left:64px;white-space:nowrap;background:#1a1d29;color:#fff;font-size:12px;
              padding:5px 9px;border-radius:7px;opacity:0;pointer-events:none;transition:.15s;z-index:5}
  .nav a:hover .lbl,.nav button:hover .lbl{opacity:1}
  .avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ffb86b,#ff7a7a);
          color:#fff;display:grid;place-items:center;font-weight:700;box-shadow:var(--shadow);
          cursor:pointer;border:0;font-size:14px}

  .content{flex:1;background:var(--canvas);padding:26px 30px;min-width:0}
  .inner{max-width:1500px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:8px;flex-wrap:wrap}
  .topbar h1{margin:0;font-size:22px}
  .topbar p{margin:3px 0 0;color:var(--muted);font-size:13px}
  .dbstatus{font-size:18px;cursor:default}

  #status{font-size:13px;color:var(--muted);margin:0 0 16px}

  /* painel base */
  .panel{background:var(--card);border-radius:20px;box-shadow:var(--shadow);margin:0 0 18px;overflow:hidden}
  .panel .ph{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:15px 20px;border-bottom:1px solid var(--line)}
  .panel .ph h2{margin:0;font-size:15px}
  .panel .ph .meta{color:var(--muted);font-size:12px}
  .panel .pb{padding:18px 20px}

  .controls{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .field input{padding:10px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:#fafbff;color:var(--txt)}
  .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px #6d5efc22}
  #k{width:120px}
  button.go{border:0;border-radius:11px;padding:12px 22px;font-size:14px;font-weight:700;
            cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 8px 18px rgba(109,94,252,.3)}
  button.go:hover{filter:brightness(1.05)}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin:0 0 22px}
  .stat{background:var(--card);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .v{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .stat.big{background:linear-gradient(135deg,#6d5efc,#9b8cff);color:#fff}
  .stat.big .l{color:#eee}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .printer{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
  .printer .ph{display:flex;justify-content:space-between;align-items:center;
              padding:13px 16px;border-bottom:1px solid var(--line)}
  .printer .ph .name{font-weight:700;font-size:14px}
  .printer .ph .tot{font-size:13px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .printer .bar{height:6px;background:#eef0f7}
  .printer .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .job{display:flex;justify-content:space-between;gap:10px;padding:9px 16px;border-top:1px solid var(--line);font-size:13px;transition:background .08s}
  .job:first-child{border-top:0}
  .job.hl{background:#dcfce7}
  .job .jp{font-weight:600;word-break:break-word}
  .job .jv{color:var(--muted);font-size:12px}
  .job .jt{white-space:nowrap;color:#374151;font-variant-numeric:tabular-nums}
  .psum{padding:11px 16px;background:#f3f1ff;border-top:1px solid var(--line)}
  .psum-h{font-size:13px;font-weight:700;color:#4b3fd6;margin:0 0 6px}
  .psum-r{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:2px 0;color:#3a4055}
  .psum-r .psum-q{white-space:nowrap;color:#5b54e0;font-weight:600;font-variant-numeric:tabular-nums}
  .printer .idle{padding:8px 16px;font-size:12px;color:var(--muted);background:#fafbff;border-top:1px solid var(--line)}
  .warn{background:#fffbeb;border:1px solid #fde68a;border-radius:16px;padding:16px 18px;margin:18px 0 0}
  .warn h3{margin:0 0 8px;font-size:14px;color:#92400e}
  .warn ul{margin:0;padding-left:20px;font-size:13px;color:#78350f}
  .empty{color:var(--muted);font-style:italic;padding:30px;text-align:center;
         background:var(--card);border-radius:20px;box-shadow:var(--shadow)}
  h2.sec{font-size:16px;margin:4px 0 14px}

  @media(max-width:820px){ .rail{flex-basis:74px} .content{padding:18px} }
</style>
</head>
<body>
<div class="wrap">
  <aside class="rail">
    <div class="brand">HS</div>
    <nav class="nav">
      <a href="dashboard.html">🏠<span class="lbl">Início</span></a>
      <a href="relatorio_pedidos.html">📋<span class="lbl">Resumo</span></a>
      <a href="produtos.html">📦<span class="lbl">Produtos</span></a>
      <a class="active">🖨️<span class="lbl">Produção</span></a>
      <a href="vendas_grafico.html">📈<span class="lbl">Vendas</span></a>
      <a href="usuarios.html">👤<span class="lbl">Usuários</span></a>
      <a href="configuracoes.html">⚙️<span class="lbl">Configurações</span></a>
      <a href="fechamento.html">📒<span class="lbl">Fechamento</span></a>
    </nav>
    <button class="avatar" onclick="Auth.logout()" title="Sair">⎋</button>
  </aside>

  <section class="content"><div class="inner">
    <div class="topbar">
      <div>
        <h1>🖨️ Distribuição nas impressoras</h1>
        <p>Planejamento de produção do dia — divide as impressões entre as máquinas para terminar o quanto antes.</p>
      </div>
      <span class="dbstatus" id="dbstatus" title="Status do banco">⚪</span>
    </div>

    <div id="status"></div>

    <div class="panel">
      <div class="ph"><h2>Parâmetros</h2><span class="meta">escolha o dia e o nº de impressoras</span></div>
      <div class="pb">
        <div class="controls">
          <div class="field">
            <label for="dataSel">Dia</label>
            <input type="date" id="dataSel">
          </div>
          <div class="field">
            <label for="k">Nº de impressoras</label>
            <input type="number" id="k" min="1" step="1" value="1">
          </div>
          <button class="go" id="distribuir">Distribuir</button>
        </div>
      </div>
    </div>

    <div id="resultado"></div>
  </div></section>
</div>

<script>
// ===== Supabase (mesma config do app) =====
const SUPABASE_URL = "https://upctjkyfazudvttqrysp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwY3Rqa3lmYXp1ZHZ0dHFyeXNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzMyMjQsImV4cCI6MjA5Njg0OTIyNH0.MhSONZDBMfbxOkTKzxip1jZ8Yy56TkYxHePtKtunCcw";
const db = (window.supabase && SUPABASE_URL && SUPABASE_ANON_KEY)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const esc = s => String(s ?? "").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const escAttr = s => esc(s).replace(/"/g, "&quot;");
const setStatus = s => document.getElementById("status").textContent = s;

const hojeISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const formatarData = iso => { const [y,m,d] = iso.split("-"); return `${d}/${m}/${y}`; };

function formatTempo(seg){
  if(seg == null) return "—";
  const h = Math.floor(seg/3600), m = Math.round((seg%3600)/60);
  const out = [];
  if(h) out.push(h + "h");
  if(m || !h) out.push(m + "m");
  return out.join(" ");
}

// Vendas do dia (mesma consulta do resumo); agrega quantidade por produto+variação
// (a origem/marketplace não importa para produção — peça é peça).
async function carregarVendasDaData(diaISO){
  if(!db) return [];
  const [y, m, d] = diaISO.split("-").map(Number);
  const inicio = new Date(y, m - 1, d).toISOString();
  const fim = new Date(y, m - 1, d + 1).toISOString();
  const linhas = [];
  const tam = 1000;
  for(let from = 0; ; from += tam){
    const { data, error } = await db.from("pedidos")
      .select("produto,variacao,quantidade")
      .gte("criado_em", inicio).lt("criado_em", fim)
      .order("id", { ascending: true })
      .range(from, from + tam - 1);
    if(error){ console.error("carregarVendasDaData:", error); break; }
    linhas.push(...data);
    if(data.length < tam) break;
  }
  return linhas;
}

// Mapa produto -> { T, N, arquivo, modelo } a partir da tabela única gcode_arquivos
async function carregarGcodes(){
  if(!db) return {};
  const { data, error } = await db.from("gcode_arquivos")
    .select("produto,arquivo,modelo,tempo_segundos,pecas").not("produto", "is", null);
  if(error){ console.error(error); return {}; }
  const map = {};
  for(const g of data) if(!map[g.produto])
    map[g.produto] = { T: g.tempo_segundos, N: g.pecas, arquivo: g.arquivo, modelo: g.modelo };
  return map;
}

// Distribuição LPT (Longest Processing Time first) em K máquinas idênticas.
function distribuirLPT(jobs, K){
  const printers = Array.from({length: K}, (_, i) => ({ idx: i+1, carga: 0, jobs: [] }));
  // mais longo -> mais curto
  const ordenados = [...jobs].sort((a, b) => b.T - a.T);
  for(const job of ordenados){
    // máquina de menor carga (empate -> menor índice)
    let alvo = printers[0];
    for(const p of printers) if(p.carga < alvo.carga) alvo = p;
    alvo.jobs.push(job);
    alvo.carga += job.T;
  }
  return printers;
}

// Ordena a fila de UMA impressora: mais demorado -> menos demorado, agrupando
// por cor (variação) quando possível. Não muda a atribuição entre máquinas —
// é só a ordem em que aquela máquina vai rodar os jobs já alocados a ela.
function ordenarFila(jobs){
  const grupos = new Map();                              // cor -> jobs
  for(const j of jobs){
    const c = j.variacao ?? "";
    if(!grupos.has(c)) grupos.set(c, []);
    grupos.get(c).push(j);
  }
  for(const arr of grupos.values()) arr.sort((a, b) => b.T - a.T);   // dentro da cor: longo -> curto
  // ordena os blocos de cor pelo job mais demorado de cada um (longo -> curto)
  const blocos = [...grupos.values()].sort((A, B) => B[0].T - A[0].T);
  return blocos.flat();
}

async function distribuir(){
  if(!db){ setStatus("⚪ Banco não configurado."); return; }
  const dia = document.getElementById("dataSel").value || hojeISO();
  const K = Math.max(1, parseInt(document.getElementById("k").value, 10) || 1);
  localStorage.setItem("hs3d_k", K);
  setStatus(`Calculando distribuição de ${formatarData(dia)} em ${K} impressora(s)…`);

  const [vendas, gmap] = await Promise.all([carregarVendasDaData(dia), carregarGcodes()]);

  // agrega quantidade por produto+variação (combina origens)
  const agg = new Map();
  for(const v of vendas){
    const key = v.produto + " ||| " + (v.variacao ?? "");
    const cur = agg.get(key) || { produto: v.produto, variacao: v.variacao ?? "", qty: 0 };
    cur.qty += v.quantidade || 0;
    agg.set(key, cur);
  }

  // gera os jobs (uma placa = um job de duração T)
  const jobs = [];
  const semTempo = [];          // produtos sem gcode/tempo
  const pecasDesc = new Set();  // tem tempo mas peças/placa desconhecido (assumido 1)
  for(const { produto, variacao, qty } of agg.values()){
    const g = gmap[produto];
    if(!g || g.T == null){ semTempo.push({ produto, variacao, qty }); continue; }
    let N = g.N;
    if(N == null || N < 1){ N = 1; pecasDesc.add(produto); }
    const totalPlacas = Math.ceil(qty / N);
    for(let i = 1; i <= totalPlacas; i++){
      const pecasPlaca = Math.min(N, qty - (i - 1) * N);   // última placa pode ser parcial
      jobs.push({ produto, variacao, T: g.T, placa: i, totalPlacas, N, qty, pecasPlaca });
    }
  }

  render({ dia, K, jobs, semTempo, pecasDesc });
}

function render({ dia, K, jobs, semTempo, pecasDesc }){
  const out = document.getElementById("resultado");

  if(!jobs.length && !semTempo.length){
    out.innerHTML = `<div class="empty">Nenhuma venda encontrada em ${formatarData(dia)}.</div>`;
    setStatus(`📅 ${formatarData(dia)}: nada a produzir.`);
    return;
  }

  const printers = jobs.length ? distribuirLPT(jobs, K) : [];
  const makespan = printers.reduce((mx, p) => Math.max(mx, p.carga), 0);
  const totalImpressao = jobs.reduce((s, j) => s + j.T, 0);
  const totalItens = jobs.reduce((s, j) => s + j.pecasPlaca, 0);

  let html = `<div class="summary">
    <div class="stat big"><div class="v">${formatTempo(makespan)}</div><div class="l">⏱ Termina em (makespan)</div></div>
    <div class="stat"><div class="v">${totalItens}</div><div class="l">📦 Itens a imprimir</div></div>
    <div class="stat"><div class="v">${jobs.length}</div><div class="l">🧱 Placas (jobs)</div></div>
    <div class="stat"><div class="v">${K}</div><div class="l">🖨️ Impressoras</div></div>
    <div class="stat"><div class="v">${formatTempo(totalImpressao)}</div><div class="l">Σ Tempo de impressão</div></div>
  </div>`;

  if(printers.length){
    html += `<h2 class="sec">Filas por impressora</h2><div class="grid">`;
    for(const p of printers){
      const ocioso = makespan - p.carga;
      const pct = makespan ? Math.round(p.carga / makespan * 100) : 0;
      html += `<div class="printer">
        <div class="ph"><span class="name">🖨️ Impressora ${p.idx}</span><span class="tot">${formatTempo(p.carga)}</span></div>
        <div class="bar"><i style="width:${pct}%"></i></div>`;
      if(!p.jobs.length){
        html += `<div class="idle">Sem jobs.</div>`;
      }else{
        // resumo: itens (peças) por produto+variação nesta impressora
        const porProd = new Map();
        for(const j of p.jobs){
          const key = j.produto + " ||| " + (j.variacao ?? "");
          const cur = porProd.get(key) || { produto: j.produto, variacao: j.variacao, itens: 0, placas: 0 };
          cur.itens += j.pecasPlaca; cur.placas += 1;
          porProd.set(key, cur);
        }
        const totalItens = [...porProd.values()].reduce((s, r) => s + r.itens, 0);
        html += `<div class="psum"><div class="psum-h">📦 ${totalItens} itens a imprimir</div>`;
        for(const r of porProd.values()){
          const vstr = r.variacao ? ` · ${esc(r.variacao)}` : "";
          html += `<div class="psum-r"><span>${esc(r.produto)}${vstr}</span>
            <span class="psum-q">${r.itens} un · ${r.placas} placa(s)</span></div>`;
        }
        html += `</div>`;
        // fila de impressão (ordem em que a máquina vai rodar)
        for(const j of ordenarFila(p.jobs)){
          const vstr = j.variacao ? ` · ${esc(j.variacao)}` : "";
          html += `<div class="job" data-prod="${escAttr(j.produto)}">
            <div><span class="jp">${esc(j.produto)}</span><span class="jv">${vstr} · placa ${j.placa}/${j.totalPlacas} · ${j.pecasPlaca} pç</span></div>
            <div class="jt">${formatTempo(j.T)}</div>
          </div>`;
        }
        html += `<div class="idle">Ocioso ao final: ${ocioso > 0 ? formatTempo(ocioso) : "—"}</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  if(pecasDesc.size){
    html += `<div class="warn"><h3>ℹ️ Peças por placa desconhecidas (assumido 1 peça/placa)</h3>
      <ul>${[...pecasDesc].map(p => `<li>${esc(p)}</li>`).join("")}</ul></div>`;
  }

  if(semTempo.length){
    html += `<div class="warn"><h3>⚠️ Sem gcode/tempo — não distribuídos (${semTempo.length})</h3>
      <ul>${semTempo.map(s => `<li>${esc(s.produto)}${s.variacao ? " · " + esc(s.variacao) : ""} — ${s.qty} un.</li>`).join("")}</ul>
      <p style="margin:8px 0 0;font-size:12px;color:#78350f">Vincule um gcode a esses produtos na tela de Produtos para incluí-los no cálculo.</p></div>`;
  }

  out.innerHTML = html;
  setStatus(`📅 ${formatarData(dia)}: ${jobs.length} placa(s) em ${K} impressora(s) · termina em ${formatTempo(makespan)}.`);
}

document.getElementById("distribuir").addEventListener("click", distribuir);

// Realça todas as linhas do mesmo produto (em qualquer impressora) ao passar o cursor
const resultadoEl = document.getElementById("resultado");
function realcar(prod, on){
  if(prod == null) return;
  resultadoEl.querySelectorAll(`.job[data-prod="${CSS.escape(prod)}"]`)
    .forEach(el => el.classList.toggle("hl", on));
}
resultadoEl.addEventListener("mouseover", e => {
  const job = e.target.closest(".job");
  if(job) realcar(job.dataset.prod, true);
});
resultadoEl.addEventListener("mouseout", e => {
  const job = e.target.closest(".job");
  if(job) realcar(job.dataset.prod, false);
});

// init
(function(){
  const dbel = document.getElementById("dbstatus");
  dbel.textContent = db ? "🟢" : "⚪";
  dbel.title = db ? "Banco conectado (Supabase)" : "Banco não configurado";
  const dataSel = document.getElementById("dataSel");
  dataSel.max = hojeISO();
  dataSel.value = hojeISO();
  const kSalvo = localStorage.getItem("hs3d_k");
  if(kSalvo) document.getElementById("k").value = kSalvo;
  setStatus(db ? "Escolha o dia e o nº de impressoras, depois clique em Distribuir." : "⚪ Banco não configurado.");
})();
</script>
