<script>

const TIPOS = ["SHOPEE","RAPIDA","TIKTOK","OUTROS"];
const LABELS = {SHOPEE:"Shopee", RAPIDA:"Entrega Rápida", TIKTOK:"TikTok", OUTROS:"Outros"};

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwY3Rqa3lmYXp1ZHZ0dHFyeXNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzMyMjQsImV4cCI6MjA5Njg0OTIyNH0.MhSONZDBMfbxOkTKzxip1jZ8Yy56TkYxHePtKtunCcw";   // ex.: "eyJhbGci..."
const db = (window.supabase && SUPABASE_URL && SUPABASE_ANON_KEY)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let estoqueSalvo = {};          // "produto ||| variacao" -> quantidade (vindo do banco)

// Data de hoje (local) no formato YYYY-MM-DD — o estoque é PARCIAL DIÁRIO:
// gravado por dia e zerado automaticamente no dia seguinte (cada dia carrega só o seu).
const hojeISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

// Chave do estoque: o estoque é por ENVIO (origem) + produto + variação.
const estKey = (origem, produto, variacao) => origem + " ||| " + produto + " ||| " + variacao;

async function carregarEstoque(){
  if(!db) return {};
  const { data, error } = await db.from("estoque")
    .select("produto,variacao,origem,quantidade").eq("dia", hojeISO());
  if(error){ console.error("carregarEstoque:", error); return {}; }
  const m = {};
  for(const r of data) m[estKey(r.origem, r.produto, r.variacao)] = r.quantidade;
  return m;
}

const _saveTimers = {};
function salvarEstoque(origem, produto, variacao, quantidade){
  if(!db) return;
  const key = estKey(origem, produto, variacao);
  estoqueSalvo[key] = quantidade;
  clearTimeout(_saveTimers[key]);
  _saveTimers[key] = setTimeout(async () => {
    const { error } = await db.from("estoque").upsert(
      { produto, variacao, origem, dia: hojeISO(), quantidade, atualizado_em: new Date().toISOString() },
      { onConflict: "produto,variacao,origem,dia" });
    if(error) console.error("salvarEstoque:", error);
  }, 500);
}

function removerEstoque(origem, produto, variacao){
  if(!db) return;
  const key = estKey(origem, produto, variacao);
  delete estoqueSalvo[key];
  clearTimeout(_saveTimers[key]);
  db.from("estoque").delete().match({ produto, variacao, origem, dia: hojeISO() })
    .then(({ error }) => { if(error) console.error("removerEstoque:", error); });
}


// --- mesmas regras do script Python ---
const LINE_RE = /^\s*1\s*\.\s*(.+?)\s*(?:\(\s*\*\s*(\d+)\s*\)|\*\s*(\d+))\s*$/;
const PROD_VAR_RE = /^(.+?)\((.+)\)\s*$/;
const RAPIDA_RE = /ENTREGA\s+RAPIDA/i;

const stripAccents = s => s.normalize("NFD").replace(/[̀-ͯ]/g,"");

function classify(pageText){
  const norm = stripAccents(pageText);
  const temDanfe = norm.includes("DANFE SIMPLIFICADO");
  const temHs3d  = pageText.includes("HS3DLab");
  const temHslab = /\bHSLab\b/.test(pageText);
  const m = pageText.match(/Pedido:\s*(\S+)/);
  const pedidoNum = m ? /^\d{15}$/.test(m[1]) : false;
  if (RAPIDA_RE.test(norm)) return "RAPIDA";            // testar antes (tbm tem DANFE)
  if (temHslab && pedidoNum && !temDanfe) return "TIKTOK";
  if (temDanfe && temHs3d) return "SHOPEE";
  return "OUTROS";
}

function parseItem(lines){
  for(const ln of lines){
    const m = ln.match(LINE_RE);
    if(!m) continue;
    const desc = m[1].replace(/\s{2,}/g," ").trim();
    const qty = parseInt(m[2] || m[3], 10);
    const pv = desc.match(PROD_VAR_RE);
    if(pv) return {prod:pv[1].trim(), varia:pv[2].trim(), qty};
    return {prod:desc, varia:"(sem variação)", qty};
  }
  return null;
}

// A variação pode embutir um multiplicador: "x,descrição" ou "descrição,x" (x = número).
// Ex.: "Honda,4" -> 4 | "2,Preto" -> 2 | "1,Aleatorio" -> 1 | "Bob Esponja,P" -> 1
function multiplicadorVariacao(varia){
  const partes = varia.split(",").map(s => s.trim());
  if(partes.length >= 2){
    if(/^\d+$/.test(partes[0])) return parseInt(partes[0], 10);
    const ult = partes[partes.length - 1];
    if(/^\d+$/.test(ult)) return parseInt(ult, 10);
  }
  return 1;
}

// Descrição da variação SEM o número multiplicador, para agrupar.
// Ex.: "Honda,1"/"Honda,3" -> "Honda" | "2,Preto"/"1,Preto" -> "Preto" | "Bob Esponja,P" -> "Bob Esponja,P"
function descricaoVariacao(varia){
  const partes = varia.split(",").map(s => s.trim());
  if(partes.length >= 2){
    if(/^\d+$/.test(partes[0])) return partes.slice(1).join(", ");
    if(/^\d+$/.test(partes[partes.length - 1])) return partes.slice(0, -1).join(", ");
  }
  return varia.trim();
}

// Reconstrói linhas de uma página a partir dos itens posicionados do PDF.js
function buildLines(textContent){
  const items = textContent.items
    .filter(it => it.str !== undefined)
    .map(it => ({x: it.transform[4], y: it.transform[5], s: it.str}));
  items.sort((a,b) => (b.y - a.y) || (a.x - b.x));
  const lines = [];
  let cur = null;
  for(const it of items){
    if(!cur || Math.abs(it.y - cur.y) > 3){
      cur = {y: it.y, parts: [it]};
      lines.push(cur);
    } else {
      cur.parts.push(it);
    }
  }
  return lines.map(l => {
    l.parts.sort((a,b) => a.x - b.x);
    return l.parts.map(p => p.s).join(" ").replace(/\s+/g," ").trim();
  });
}

// --- estado / agregação ---
let selectedFiles = [];   // File[] do seletor/arrastar
let sourceNames = [];     // nomes das fontes processadas (p/ relatório)
let resultado = null;
let gruposReg = {};            // gid -> {prod, total, items} (p/ o painel de fixados)
let estoqueReg = {};           // gid -> { i: estoque } (estoque digitado por variação)
const pinned = new Set();      // gids fixados

function novoAgg(){
  const d = {};
  TIPOS.forEach(t => d[t] = {map:new Map(), pecas:0, etiquetas:0});
  return d;
}

// Lê os PDFs e devolve uma LISTA DE LINHAS individuais (uma por etiqueta):
// {pedido, origem, produto, varia (descrição agrupada), qty (com multiplicador)}
async function processar(sources){
  sourceNames = sources.map(s => s.name);
  const linhas = [];
  for(let f=0; f<sources.length; f++){
    const src = sources[f];
    setStatus(`Lendo ${src.name} (${f+1}/${sources.length})…`);
    const buf = await src.load();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    for(let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      const lines = buildLines(tc);
      const pageText = lines.join("\n");
      const item = parseItem(lines);
      if(!item) continue;
      linhas.push({
        pedido: (pageText.match(/Pedido:\s*(\S+)/) || [])[1] || "(sem nº)",
        origem: classify(pageText),
        produto: item.prod,
        varia: descricaoVariacao(item.varia),
        qty: item.qty * multiplicadorVariacao(item.varia)
      });
      if(p % 25 === 0) setStatus(`${src.name}: página ${p}/${pdf.numPages}…`);
    }
  }
  return linhas;
}

// Agrega linhas individuais na estrutura usada pelo relatório (por tipo / produto+variação)
function agregarLinhas(linhas){
  const data = novoAgg();
  for(const l of linhas){
    const b = data[l.origem] || data.OUTROS;
    const key = l.produto + " ||| " + l.varia;
    const cur = b.map.get(key) || {prod:l.produto, varia:l.varia, qty:0, pedidos:[]};
    cur.qty += l.qty;
    cur.pedidos.push({pedido:l.pedido, q:l.qty});
    b.map.set(key, cur);
    b.pecas += l.qty;
    b.etiquetas += 1;
  }
  return data;
}

// Remove as linhas cujo nº de venda (pedido) JÁ existe no banco. Retorna {novas, ignoradas}.
async function filtrarNovas(linhas){
  if(!db) return { novas: linhas, ignoradas: 0 };
  const pedidos = [...new Set(linhas.map(l => l.pedido).filter(p => p && p !== "(sem nº)"))];
  const existentes = new Set();
  for(let i=0; i<pedidos.length; i+=200){
    const lote = pedidos.slice(i, i+200);
    const { data, error } = await db.from("pedidos").select("pedido").in("pedido", lote);
    if(error) throw error;
    data.forEach(r => existentes.add(r.pedido));
  }
  const novas = linhas.filter(l => !existentes.has(l.pedido));
  return { novas, ignoradas: linhas.length - novas.length };
}

// Insere as vendas novas no banco (relatório do lote + pedidos + catálogo de produtos)
async function inserirPedidos(novas){
  if(!db || !novas.length) return;
  const tot = {SHOPEE:0, RAPIDA:0, TIKTOK:0, OUTROS:0};
  novas.forEach(l => { tot[l.origem] = (tot[l.origem] || 0) + l.qty; });
  const { data: rel, error: e1 } = await db.from("relatorios").insert({
    arquivos: sourceNames.join(", "),
    etiquetas: novas.length,
    total_geral: novas.reduce((s,l)=>s+l.qty, 0),
    total_shopee: tot.SHOPEE, total_rapida: tot.RAPIDA, total_tiktok: tot.TIKTOK
  }).select("id").single();
  if(e1) throw e1;
  const produtos = [...new Set(novas.map(l => l.produto))].map(c => ({codigo:c}));
  await db.from("produtos").upsert(produtos, {onConflict:"codigo", ignoreDuplicates:true});
  const rows = novas.map(l => ({
    relatorio_id: rel.id, pedido:l.pedido, origem:l.origem,
    produto:l.produto, variacao:l.varia, quantidade:l.qty
  }));
  for(let i=0; i<rows.length; i+=500){
    const { error } = await db.from("pedidos").insert(rows.slice(i, i+500));
    if(error) throw error;
  }
}

// Carrega do banco todas as vendas importadas HOJE (criado_em >= meia-noite local)
async function carregarVendasDoDia(){
  if(!db) return [];
  const agora = new Date();
  const inicio = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate()).toISOString();
  const linhas = [];
  const tam = 1000;
  for(let from = 0; ; from += tam){
    const { data, error } = await db.from("pedidos")
      .select("pedido,origem,produto,variacao,quantidade")
      .gte("criado_em", inicio)
      .order("id", { ascending: true })
      .range(from, from + tam - 1);
    if(error){ console.error("carregarVendasDoDia:", error); break; }
    linhas.push(...data.map(r => ({
      pedido: r.pedido, origem: r.origem, produto: r.produto, varia: r.variacao, qty: r.quantidade
    })));
    if(data.length < tam) break;
  }
  return linhas;
}

function ordenar(map){
  return [...map.values()].sort((a,b) =>
    b.qty - a.qty || a.prod.localeCompare(b.prod) || a.varia.localeCompare(b.varia));
}

function render(data){
  const totEtq = TIPOS.reduce((s,t)=>s+data[t].etiquetas,0);
  const totPec = TIPOS.reduce((s,t)=>s+data[t].pecas,0);

  let html = '<div class="summary">';
  const chip = (cls,t) => `<div class="chip ${cls}"><div class="t">${LABELS[t]}</div>
      <div class="n">${data[t].pecas}</div>
      <div class="s">${data[t].etiquetas} etiquetas · ${data[t].map.size} itens</div></div>`;
  html += chip("shopee","SHOPEE") + chip("rapida","RAPIDA") + chip("tiktok","TIKTOK");
  html += `<div class="chip total"><div class="t">Total</div><div class="n">${totPec}</div>
      <div class="s">${totEtq} etiquetas</div></div></div>`;

  if(data.OUTROS.etiquetas){
    html += `<div class="warn">⚠️ ${data.OUTROS.etiquetas} etiqueta(s) caíram em
      <b>Outros</b> (não casaram com nenhuma regra). Confira o logo no PDF.</div>`;
  }

  const classOf = {SHOPEE:"shopee",RAPIDA:"rapida",TIKTOK:"tiktok",OUTROS:"outros"};
  gruposReg = {};            // reinicia registro/fixados a cada novo relatório
  estoqueReg = {};
  pinned.clear();
  let gi = 0;
  for(const t of TIPOS){
    const b = data[t];
    if(t === "OUTROS" && b.etiquetas === 0) continue;
    const grupos = agruparPorProduto(b.map);
    html += `<section class="tipo ${classOf[t]}">
      <h2>${LABELS[t]} <small>— ${b.pecas} peças · ${b.etiquetas} etiquetas · ${grupos.length} produtos</small></h2>
      <table><thead><tr><th class="sel">Estoque</th><th class="qty">Qtd</th><th>Produto / Variação</th></tr></thead><tbody>`;
    if(grupos.length === 0){
      html += `<tr class="empty"><td colspan="3">nenhuma etiqueta deste tipo</td></tr>`;
    } else {
      for(const g of grupos){
        const gid = gi++;
        gruposReg[gid] = {prod:g.prod, total:g.total, items:g.items, tipo:t};
        html += `<tr class="subhdr" title="${escAttr(tooltipPedidos(g.pedidos))}"><td class="sel"></td>` +
          `<td class="qty">${g.total}</td><td><b>${esc(g.prod)}</b><span class="cnt">${g.items.length} variação(ões)</span>` +
          `<button class="pin" data-g="${gid}" title="Fixar produto">📌</button></td></tr>`;
        g.items.forEach((r, idx) => {
          const est = estoqueSalvo[estKey(t, g.prod, r.varia)];
          let cls = "", val = "";
          if(est !== undefined && est !== null){
            val = est;
            cls = est >= r.qty ? "ok" : "low";
            (estoqueReg[gid] = estoqueReg[gid] || {})[idx] = est;
          }
          html += `<tr class="item ${cls}" title="${escAttr(tooltipPedidos(r.pedidos))}"><td class="sel estq"><input type="number" min="0" class="estoque" data-g="${gid}" data-i="${idx}" data-total="${r.qty}" value="${val}" placeholder="–"></td>` +
            `<td class="qty">${r.qty}</td><td class="varia">${esc(r.varia)}</td></tr>`;
        });
      }
    }
    html += `</tbody></table></section>`;
  }
  document.getElementById("report").innerHTML = html;
  renderPinned();
}

// Agrupa o Map de itens por produto -> [{prod, total, items:[{varia,qty}]}]
function agruparPorProduto(map){
  const porProd = new Map();
  for(const r of map.values()){
    const g = porProd.get(r.prod) || {prod:r.prod, total:0, items:[], pedidos:[]};
    g.items.push({varia:r.varia, qty:r.qty, pedidos:r.pedidos});
    g.total += r.qty;
    g.pedidos = g.pedidos.concat(r.pedidos);
    porProd.set(r.prod, g);
  }
  const grupos = [...porProd.values()];
  grupos.forEach(g => g.items.sort((a,b) => b.qty - a.qty || a.varia.localeCompare(b.varia)));
  grupos.sort((a,b) => b.total - a.total || a.prod.localeCompare(b.prod));
  return grupos;
}

// Monta o texto do tooltip com os pedidos que compõem a soma
function tooltipPedidos(lista){
  const m = new Map();
  for(const p of lista) m.set(p.pedido, (m.get(p.pedido) || 0) + p.q);
  const arr = [...m.entries()].map(([ped, q]) => q > 1 ? `${ped} (×${q})` : ped);
  return `Pedidos (${arr.length}):\n` + arr.join("\n");
}
const escAttr = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// --- Estoque: colore a linha conforme o estoque digitado vs o total necessário ---
// amarelo = estoque < total | verde = estoque >= total | vazio = sem cor
document.getElementById("report").addEventListener("input", e => {
  if(!e.target.classList.contains("estoque")) return;
  const tr = e.target.closest("tr");
  tr.classList.remove("low", "ok");
  const g = e.target.dataset.g, i = e.target.dataset.i;
  const total = parseInt(e.target.dataset.total, 10);
  const grp = gruposReg[g];
  const origem = grp ? grp.tipo : null;
  const produto = grp ? grp.prod : null;
  const variacao = grp ? grp.items[i].varia : null;
  const v = e.target.value.trim();
  const n = parseInt(v, 10);
  if(!estoqueReg[g]) estoqueReg[g] = {};
  if(v === "" || Number.isNaN(n)){
    delete estoqueReg[g][i];
    if(produto) removerEstoque(origem, produto, variacao);
  } else {
    estoqueReg[g][i] = n;
    tr.classList.add(n >= total ? "ok" : "low");
    if(produto) salvarEstoque(origem, produto, variacao, n);
  }
  if(pinned.has(g)) renderPinned();   // reflete no painel fixo
});

// --- Fixar produtos: painel fixo que continua visível no scroll ---
function syncPinButtons(){
  document.querySelectorAll("#report .pin").forEach(btn =>
    btn.classList.toggle("active", pinned.has(btn.dataset.g)));
}

function renderPinned(){
  const box = document.getElementById("pinned");
  if(pinned.size === 0){ box.classList.remove("show"); box.innerHTML = ""; syncPinButtons(); return; }
  let html = `<div class="pinned-hd"><span>📌 Fixados (${pinned.size})</span><button id="unpinAll">Limpar</button></div>`;
  for(const g of pinned){
    const grp = gruposReg[g];
    if(!grp) continue;
    const cls = {SHOPEE:"shopee",RAPIDA:"rapida",TIKTOK:"tiktok",OUTROS:"outros"}[grp.tipo] || "outros";
    html += `<div class="pcard"><div class="pcard-hd"><b>${esc(grp.prod)}</b>` +
      `<span class="ptot">${grp.total}</span><button class="unpin" data-g="${g}" title="Desafixar">✕</button></div>` +
      `<div class="porigem"><span class="dot ${cls}"></span>Origem: ${LABELS[grp.tipo]}</div>`;
    grp.items.forEach((it, i) => {
      const est = estoqueReg[g] ? estoqueReg[g][i] : undefined;
      const cls = est === undefined ? "" : (est >= it.qty ? "ok" : "low");
      const estTxt = est === undefined ? "–" : est;
      html += `<div class="prow ${cls}"><span>${esc(it.varia)}</span>` +
        `<span class="pq"><b>${estTxt}</b> / ${it.qty}</span></div>`;
    });
    html += `</div>`;
  }
  box.innerHTML = html;
  box.classList.add("show");
  syncPinButtons();
}

// clique no 📌 dentro do relatório
document.getElementById("report").addEventListener("click", e => {

// --- TXT / CSV (mesmo formato do script) ---
function gerarTXT(data){
  const L = [];
  L.push("=".repeat(60));
  L.push("RELATORIO DE PRODUCAO POR TIPO (Shopee / Rapida / TikTok)");
  L.push("=".repeat(60));
  L.push("Arquivos analisados:");
  sourceNames.forEach(n => L.push("  - " + n));
  for(const t of TIPOS){
    const b = data[t];
    L.push(""); L.push("#".repeat(60)); L.push("# " + t); L.push("#".repeat(60));
    if(b.map.size === 0){ L.push("  (nenhuma etiqueta deste tipo)"); continue; }
    L.push("  QTD  PRODUTO - VARIACAO"); L.push("-".repeat(60));
    for(const r of ordenar(b.map))
      L.push(String(r.qty).padStart(5) + "  " + r.prod + " - " + r.varia);
    L.push("-".repeat(60));
    L.push(`  Itens distintos: ${b.map.size} | Etiquetas: ${b.etiquetas} | Pecas: ${b.pecas}`);
  }
  const totEtq = TIPOS.reduce((s,t)=>s+data[t].etiquetas,0);
  const totPec = TIPOS.reduce((s,t)=>s+data[t].pecas,0);
  L.push(""); L.push("=".repeat(60)); L.push("RESUMO GERAL"); L.push("-".repeat(60));
  for(const t of TIPOS)
    L.push(`  ${t.padEnd(8)}: ${String(data[t].etiquetas).padStart(4)} etiquetas | ${String(data[t].pecas).padStart(4)} pecas`);
  L.push(`  ${"TOTAL".padEnd(8)}: ${String(totEtq).padStart(4)} etiquetas | ${String(totPec).padStart(4)} pecas`);
  L.push("=".repeat(60));
  return L.join("\n") + "\n";
}

function gerarCSV(data){
  const rows = [["tipo","produto","variacao","quantidade"]];
  for(const t of TIPOS)
    for(const r of ordenar(data[t].map))
      rows.push([LABELS[t], r.prod, r.varia, r.qty]);
  return rows.map(r => r.map(c => {
    const v = String(c);
    return /[",;\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
  }).join(";")).join("\n");
}

function baixar(nome, conteudo, tipo){
  const blob = new Blob([conteudo], {type: tipo});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = nome;
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Resolução de links em URLs de PDF ---
const ehPdf = u => /\.pdf(\?.*)?$/i.test(u);
function nomeDeUrl(u){
  try{ return decodeURIComponent(new URL(u).pathname.split("/").pop()) || u; }
  catch{ return u; }
}

async function listarGitHub(owner, repo, branch, path){
  const base = `https://api.github.com/repos/${owner}/${repo}/contents`;
  const api = path ? `${base}/${path}?ref=${branch}` : `${base}?ref=${branch}`;
  const r = await fetch(api);
  if(!r.ok) throw new Error(`GitHub API HTTP ${r.status} (${api})`);
  const arr = await r.json();
  if(!Array.isArray(arr)) throw new Error("O link do GitHub não aponta para uma pasta.");
  return arr.filter(x => x.type === "file" && ehPdf(x.name)).map(x => x.download_url);
}

// Recebe uma linha (URL) e devolve uma lista de URLs de PDF
async function resolverLink(line){
  // Pasta do GitHub: .../tree/<branch>[/<path>]
  const gh = line.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/tree\/([^/]+)(?:\/(.+))?\/?$/);
  if(gh){
    const [, owner, repo, branch, path = ""] = gh;
    return listarGitHub(owner, repo, branch, path.replace(/\/$/, ""));
  }
  // Link direto para um PDF
  if(ehPdf(line)) return [line];
  // Caso geral: tenta abrir como página HTML e extrair links .pdf
  const r = await fetch(line);
  if(!r.ok) throw new Error(`HTTP ${r.status} em ${line}`);
  const html = await r.text();
  const doc = new DOMParser().parseFromString(html, "text/html");
  const hrefs = [...doc.querySelectorAll("a[href]")].map(a => a.getAttribute("href"));
  const pdfs = hrefs.filter(ehPdf).map(h => { try{ return new URL(h, line).href; }catch{ return null; } });
  return [...new Set(pdfs.filter(Boolean))];
}

// Executa a análise sobre uma lista de fontes [{name, load}]
async function run(sources){
  goBtn.disabled = true; goUrlBtn.disabled = true; txtBtn.disabled = csvBtn.disabled = true;
  document.getElementById("report").innerHTML = "";
  try{
    if(!sources.length){ setStatus("Nada para processar."); return; }
    const linhas = await processar(sources);
    setStatus("Verificando vendas já existentes no banco…");
    const { novas, ignoradas } = await filtrarNovas(linhas);
    if(db && novas.length){ setStatus(`Gravando ${novas.length} venda(s) nova(s)…`); await inserirPedidos(novas); }
    estoqueSalvo = await carregarEstoque();   // puxa estoque do banco (se configurado)
    resultado = agregarLinhas(novas);         // exibe só as vendas novas
    render(resultado);
    setStatus(db
      ? `✅ ${novas.length} venda(s) nova(s) importada(s) · ${ignoradas} ignorada(s) (já no banco).`
      : `✅ ${linhas.length} item(ns) (banco não configurado — sem deduplicação).`);
    txtBtn.disabled = csvBtn.disabled = false;
  }catch(err){
    setStatus("Erro: " + err.message);
    console.error(err);
  }finally{
    goBtn.disabled = selectedFiles.length === 0; goUrlBtn.disabled = false;
  }
}

goBtn.addEventListener("click", () =>
  run(selectedFiles.map(file => ({ name: file.name, load: () => file.arrayBuffer() }))));

goUrlBtn.addEventListener("click", async () => {
  const linhas = urlsEl.value.split("\n").map(s => s.trim()).filter(Boolean);
  if(!linhas.length){ setStatus("Cole ao menos um link."); return; }
  goUrlBtn.disabled = true; setStatus("Resolvendo links…");
  let urls = [];
  try{
    for(const linha of linhas) urls.push(...await resolverLink(linha));
  }catch(err){
    setStatus("Erro ao resolver link: " + err.message +
      "  (o servidor pode bloquear acesso externo — CORS).");
    goUrlBtn.disabled = false; return;
  }
  urls = [...new Set(urls)];
  if(!urls.length){ setStatus("Nenhum PDF encontrado nos links informados."); goUrlBtn.disabled = false; return; }
  setStatus(`${urls.length} PDF(s) encontrado(s). Baixando…`);
  const sources = urls.map(u => ({
    name: nomeDeUrl(u),
    load: async () => {
      const r = await fetch(u);
      if(!r.ok) throw new Error(`HTTP ${r.status} ao baixar ${u}`);
      return await r.arrayBuffer();
    }
  }));
  run(sources);
});
