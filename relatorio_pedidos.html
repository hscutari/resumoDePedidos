<!DOCTYPE html>

<head>

<style>

    --shopee:#ee4d2d; --rapida:#2563eb; --tiktok:#111; --bg:#f5f6f8; --card:#fff;
    --line:#e5e7eb; --txt:#1f2937; --muted:#6b7280;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       margin:0;background:var(--bg);color:var(--txt)}

  #drop{border:2px dashed #9ca3af;border-radius:12px;background:var(--card);
        padding:40px;text-align:center;cursor:pointer;transition:.15s}
  #drop.hover{border-color:var(--rapida);background:#eff6ff}
  #drop strong{color:var(--rapida)}

  section.tipo{background:var(--card);border:1px solid var(--line);border-radius:12px;

  section.tipo h2{margin:0;padding:14px 18px;font-size:16px;color:#fff}
  section.tipo h2 small{font-weight:400;opacity:.85}
  .shopee h2{background:var(--shopee)} .rapida h2{background:var(--rapida)}
  .tiktok h2{background:var(--tiktok)} .outros h2{background:#9333ea}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:8px 18px;border-top:1px solid var(--line);text-align:left}
  th{background:#f9fafb;font-size:12px;color:var(--muted);text-transform:uppercase}
  td.qty{font-weight:700;width:70px;text-align:right}

  .warn{background:#fef3c7;border:1px solid #fcd34d;color:#92400e;padding:10px 14px;
        border-radius:8px;font-size:13px;margin:12px 0}
  .urlbox{margin-top:14px}

  .urlbox textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;
       font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;resize:vertical}
  .sep{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:14px 0}

  .floatbar{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
    background:#111827;color:#fff;padding:12px 22px;border-radius:999px;
    box-shadow:0 10px 30px rgba(0,0,0,.28);display:none;align-items:center;gap:18px;
    font-size:14px;z-index:1000}
  .floatbar.show{display:flex}
  .floatbar .big{font-size:22px;font-weight:700}
  .floatbar .big small{font-size:13px;font-weight:400;opacity:.8}
  .floatbar button{background:#374151;color:#fff;padding:7px 14px;font-size:13px;border-radius:8px}
  #report{padding-bottom:90px}
</style>

<body>
<header>
  <h1>Relatório de Produção por Tipo</h1>
  <p>Importe PDFs (arquivos ou link) de etiquetas — Shopee · Entrega Rápida · TikTok. Tudo roda no seu navegador.</p>
</header>
<main>
  <div id="drop">
    <div>📄 <strong>Clique para escolher</strong> ou arraste os PDFs aqui</div>
    <input id="input" type="file" accept="application/pdf" multiple hidden>
    <div id="files"></div>
  </div>

  <div class="sep">ou</div>

  <div class="urlbox">
    <label for="urls">Cole um ou mais links (um por linha): link direto <code>.pdf</code>, pasta do GitHub, ou página com lista de PDFs</label>
    <textarea id="urls" rows="3" placeholder="https://servidor.com/etiquetas/lote1.pdf
https://github.com/usuario/repositorio/tree/main/pdfs"></textarea>
  </div>

  <div class="toolbar">
    <button id="go" disabled>Gerar dos arquivos</button>
    <button id="goUrl">Gerar do(s) link(s)</button>

  </div>
  <div id="status"></div>
  <div id="report"></div>
</main>

<div id="floatbar" class="floatbar"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const TIPOS = ["SHOPEE","RAPIDA","TIKTOK","OUTROS"];
const LABELS = {SHOPEE:"Shopee", RAPIDA:"Entrega Rápida", TIKTOK:"TikTok", OUTROS:"Outros"};

// --- mesmas regras do script Python ---
const LINE_RE = /^\s*1\s*\.\s*(.+?)\s*(?:\(\s*\*\s*(\d+)\s*\)|\*\s*(\d+))\s*$/;
const PROD_VAR_RE = /^(.+?)\((.+)\)\s*$/;
const RAPIDA_RE = /ENTREGA\s+RAPIDA/i;

const stripAccents = s => s.normalize("NFD").replace(/[̀-ͯ]/g,"");

function classify(pageText){
  const norm = stripAccents(pageText);
  const temDanfe = norm.includes("DANFE SIMPLIFICADO");
  const temHs3d  = pageText.includes("HS3DLab");
  const temHslab = /\bHSLab\b/.test(pageText);
  const m = pageText.match(/Pedido:\s*(\S+)/);
  const pedidoNum = m ? /^\d{15}$/.test(m[1]) : false;
  if (RAPIDA_RE.test(norm)) return "RAPIDA";            // testar antes (tbm tem DANFE)
  if (temHslab && pedidoNum && !temDanfe) return "TIKTOK";
  if (temDanfe && temHs3d) return "SHOPEE";
  return "OUTROS";
}

function parseItem(lines){
  for(const ln of lines){
    const m = ln.match(LINE_RE);
    if(!m) continue;
    const desc = m[1].replace(/\s{2,}/g," ").trim();
    const qty = parseInt(m[2] || m[3], 10);
    const pv = desc.match(PROD_VAR_RE);
    if(pv) return {prod:pv[1].trim(), varia:pv[2].trim(), qty};
    return {prod:desc, varia:"(sem variação)", qty};
  }
  return null;
}

// A variação pode embutir um multiplicador: "x,descrição" ou "descrição,x" (x = número).
// Ex.: "Honda,4" -> 4 | "2,Preto" -> 2 | "1,Aleatorio" -> 1 | "Bob Esponja,P" -> 1
function multiplicadorVariacao(varia){
  const partes = varia.split(",").map(s => s.trim());
  if(partes.length >= 2){
    if(/^\d+$/.test(partes[0])) return parseInt(partes[0], 10);
    const ult = partes[partes.length - 1];
    if(/^\d+$/.test(ult)) return parseInt(ult, 10);
  }
  return 1;
}

// Descrição da variação SEM o número multiplicador, para agrupar.
// Ex.: "Honda,1"/"Honda,3" -> "Honda" | "2,Preto"/"1,Preto" -> "Preto" | "Bob Esponja,P" -> "Bob Esponja,P"
function descricaoVariacao(varia){
  const partes = varia.split(",").map(s => s.trim());
  if(partes.length >= 2){
    if(/^\d+$/.test(partes[0])) return partes.slice(1).join(", ");
    if(/^\d+$/.test(partes[partes.length - 1])) return partes.slice(0, -1).join(", ");
  }
  return varia.trim();
}

// Reconstrói linhas de uma página a partir dos itens posicionados do PDF.js
function buildLines(textContent){
  const items = textContent.items
    .filter(it => it.str !== undefined)
    .map(it => ({x: it.transform[4], y: it.transform[5], s: it.str}));
  items.sort((a,b) => (b.y - a.y) || (a.x - b.x));
  const lines = [];
  let cur = null;
  for(const it of items){
    if(!cur || Math.abs(it.y - cur.y) > 3){
      cur = {y: it.y, parts: [it]};
      lines.push(cur);
    } else {
      cur.parts.push(it);
    }
  }
  return lines.map(l => {
    l.parts.sort((a,b) => a.x - b.x);
    return l.parts.map(p => p.s).join(" ").replace(/\s+/g," ").trim();
  });
}

// --- estado / agregação ---
let selectedFiles = [];   // File[] do seletor/arrastar
let sourceNames = [];     // nomes das fontes processadas (p/ relatório)
let resultado = null;

function novoAgg(){
  const d = {};
  TIPOS.forEach(t => d[t] = {map:new Map(), pecas:0, etiquetas:0});
  return d;
}

// sources: [{name, load: async () => ArrayBuffer}]
async function processar(sources){
  const data = novoAgg();
  sourceNames = sources.map(s => s.name);
  for(let f=0; f<sources.length; f++){
    const src = sources[f];
    setStatus(`Lendo ${src.name} (${f+1}/${sources.length})…`);
    const buf = await src.load();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    for(let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      const lines = buildLines(tc);
      const pageText = lines.join("\n");
      const item = parseItem(lines);
      if(!item) continue;
      const tipo = classify(pageText);
      const add = item.qty * multiplicadorVariacao(item.varia);  // multiplicador da variação
      const desc = descricaoVariacao(item.varia);                // agrupa pela descrição
      const ped = (pageText.match(/Pedido:\s*(\S+)/) || [])[1] || "(sem nº)";
      const key = item.prod + " ||| " + desc;
      const bucket = data[tipo];
      const cur = bucket.map.get(key) || {prod:item.prod, varia:desc, qty:0, pedidos:[]};
      cur.qty += add;
      cur.pedidos.push({pedido:ped, q:add});
      bucket.map.set(key, cur);
      bucket.pecas += add;
      bucket.etiquetas += 1;
      if(p % 25 === 0) setStatus(`${src.name}: página ${p}/${pdf.numPages}…`);
    }
  }
  return data;
}

function ordenar(map){
  return [...map.values()].sort((a,b) =>
    b.qty - a.qty || a.prod.localeCompare(b.prod) || a.varia.localeCompare(b.varia));
}

function render(data){
  const totEtq = TIPOS.reduce((s,t)=>s+data[t].etiquetas,0);
  const totPec = TIPOS.reduce((s,t)=>s+data[t].pecas,0);

  let html = '<div class="summary">';
  const chip = (cls,t) => `<div class="chip ${cls}"><div class="t">${LABELS[t]}</div>
      <div class="n">${data[t].pecas}</div>
      <div class="s">${data[t].etiquetas} etiquetas · ${data[t].map.size} itens</div></div>`;
  html += chip("shopee","SHOPEE") + chip("rapida","RAPIDA") + chip("tiktok","TIKTOK");
  html += `<div class="chip total"><div class="t">Total</div><div class="n">${totPec}</div>
      <div class="s">${totEtq} etiquetas</div></div></div>`;

  if(data.OUTROS.etiquetas){
    html += `<div class="warn">⚠️ ${data.OUTROS.etiquetas} etiqueta(s) caíram em
      <b>Outros</b> (não casaram com nenhuma regra). Confira o logo no PDF.</div>`;
  }

  const classOf = {SHOPEE:"shopee",RAPIDA:"rapida",TIKTOK:"tiktok",OUTROS:"outros"};
  let gi = 0;   // índice global de subgrupo (p/ selecionar grupo inteiro)
  for(const t of TIPOS){
    const b = data[t];
    if(t === "OUTROS" && b.etiquetas === 0) continue;
    const grupos = agruparPorProduto(b.map);
    html += `<section class="tipo ${classOf[t]}">
      <h2>${LABELS[t]} <small>— ${b.pecas} peças · ${b.etiquetas} etiquetas · ${grupos.length} produtos</small></h2>
      <table><thead><tr><th class="sel"></th><th class="qty">Qtd</th><th>Produto / Variação</th></tr></thead><tbody>`;
    if(grupos.length === 0){
      html += `<tr class="empty"><td colspan="3">nenhuma etiqueta deste tipo</td></tr>`;
    } else {
      for(const g of grupos){
        const gid = gi++;
        html += `<tr class="subhdr" title="${escAttr(tooltipPedidos(g.pedidos))}"><td class="sel"><input type="checkbox" class="sel-group" data-g="${gid}" title="Selecionar grupo"></td>` +
          `<td class="qty">${g.total}</td><td><b>${esc(g.prod)}</b><span class="cnt">${g.items.length} variação(ões)</span></td></tr>`;
        for(const r of g.items){
          html += `<tr class="item" title="${escAttr(tooltipPedidos(r.pedidos))}"><td class="sel"><input type="checkbox" class="sel-item" data-g="${gid}" data-qty="${r.qty}"></td>` +
            `<td class="qty">${r.qty}</td><td class="varia">${esc(r.varia)}</td></tr>`;
        }
      }
    }
    html += `</tbody></table></section>`;
  }
  document.getElementById("report").innerHTML = html;
  atualizarBarra();   // some/reseta o menu flutuante ao re-renderizar
}

// Agrupa o Map de itens por produto -> [{prod, total, items:[{varia,qty}]}]
function agruparPorProduto(map){
  const porProd = new Map();
  for(const r of map.values()){
    const g = porProd.get(r.prod) || {prod:r.prod, total:0, items:[], pedidos:[]};
    g.items.push({varia:r.varia, qty:r.qty, pedidos:r.pedidos});
    g.total += r.qty;
    g.pedidos = g.pedidos.concat(r.pedidos);
    porProd.set(r.prod, g);
  }
  const grupos = [...porProd.values()];
  grupos.forEach(g => g.items.sort((a,b) => b.qty - a.qty || a.varia.localeCompare(b.varia)));
  grupos.sort((a,b) => b.total - a.total || a.prod.localeCompare(b.prod));
  return grupos;
}

// Monta o texto do tooltip com os pedidos que compõem a soma
function tooltipPedidos(lista){
  const m = new Map();
  for(const p of lista) m.set(p.pedido, (m.get(p.pedido) || 0) + p.q);
  const arr = [...m.entries()].map(([ped, q]) => q > 1 ? `${ped} (×${q})` : ped);
  return `Pedidos (${arr.length}):\n` + arr.join("\n");
}
const escAttr = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// --- Menu flutuante: soma das quantidades dos itens selecionados ---
function atualizarBarra(){
  const bar = document.getElementById("floatbar");
  const marcados = document.querySelectorAll("#report .sel-item:checked");
  // realça as linhas marcadas
  document.querySelectorAll("#report tr.checked").forEach(tr => tr.classList.remove("checked"));
  marcados.forEach(c => c.closest("tr").classList.add("checked"));

  if(marcados.length === 0){ bar.classList.remove("show"); bar.innerHTML = ""; return; }
  let soma = 0;
  marcados.forEach(c => soma += parseInt(c.dataset.qty, 10));
  bar.innerHTML =
    `<span><b>${marcados.length}</b> item(ns) selecionado(s)</span>` +
    `<span class="big">${soma} <small>peças</small></span>` +
    `<button id="limparSel">Limpar seleção</button>`;
  bar.classList.add("show");
  document.getElementById("limparSel").onclick = () => {
    document.querySelectorAll("#report .sel-item:checked").forEach(c => c.checked = false);
    document.querySelectorAll("#report .sel-group").forEach(c => { c.checked = false; c.indeterminate = false; });
    atualizarBarra();
  };
}

// sincroniza o checkbox do grupo com o estado das suas variações
function sincronizarGrupo(g){
  const header = document.querySelector(`#report .sel-group[data-g="${g}"]`);
  if(!header) return;
  const itens = [...document.querySelectorAll(`#report .sel-item[data-g="${g}"]`)];
  const marcados = itens.filter(c => c.checked).length;
  header.checked = marcados === itens.length && itens.length > 0;
  header.indeterminate = marcados > 0 && marcados < itens.length;
}

// delegação: checkboxes (item ou grupo) atualizam a barra
document.getElementById("report").addEventListener("change", e => {
  if(e.target.classList.contains("sel-group")){
    const g = e.target.dataset.g;
    document.querySelectorAll(`#report .sel-item[data-g="${g}"]`)
      .forEach(c => c.checked = e.target.checked);
    e.target.indeterminate = false;
    atualizarBarra();
  } else if(e.target.classList.contains("sel-item")){
    sincronizarGrupo(e.target.dataset.g);
    atualizarBarra();
  }
});

// --- TXT / CSV (mesmo formato do script) ---
function gerarTXT(data){
  const L = [];
  L.push("=".repeat(60));
  L.push("RELATORIO DE PRODUCAO POR TIPO (Shopee / Rapida / TikTok)");
  L.push("=".repeat(60));
  L.push("Arquivos analisados:");
  sourceNames.forEach(n => L.push("  - " + n));
  for(const t of TIPOS){
    const b = data[t];
    L.push(""); L.push("#".repeat(60)); L.push("# " + t); L.push("#".repeat(60));
    if(b.map.size === 0){ L.push("  (nenhuma etiqueta deste tipo)"); continue; }
    L.push("  QTD  PRODUTO - VARIACAO"); L.push("-".repeat(60));
    for(const r of ordenar(b.map))
      L.push(String(r.qty).padStart(5) + "  " + r.prod + " - " + r.varia);
    L.push("-".repeat(60));
    L.push(`  Itens distintos: ${b.map.size} | Etiquetas: ${b.etiquetas} | Pecas: ${b.pecas}`);
  }
  const totEtq = TIPOS.reduce((s,t)=>s+data[t].etiquetas,0);
  const totPec = TIPOS.reduce((s,t)=>s+data[t].pecas,0);
  L.push(""); L.push("=".repeat(60)); L.push("RESUMO GERAL"); L.push("-".repeat(60));
  for(const t of TIPOS)
    L.push(`  ${t.padEnd(8)}: ${String(data[t].etiquetas).padStart(4)} etiquetas | ${String(data[t].pecas).padStart(4)} pecas`);
  L.push(`  ${"TOTAL".padEnd(8)}: ${String(totEtq).padStart(4)} etiquetas | ${String(totPec).padStart(4)} pecas`);
  L.push("=".repeat(60));
  return L.join("\n") + "\n";
}

function gerarCSV(data){
  const rows = [["tipo","produto","variacao","quantidade"]];
  for(const t of TIPOS)
    for(const r of ordenar(data[t].map))
      rows.push([LABELS[t], r.prod, r.varia, r.qty]);
  return rows.map(r => r.map(c => {
    const v = String(c);
    return /[",;\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
  }).join(";")).join("\n");
}

function baixar(nome, conteudo, tipo){
  const blob = new Blob([conteudo], {type: tipo});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = nome;
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Resolução de links em URLs de PDF ---
const ehPdf = u => /\.pdf(\?.*)?$/i.test(u);
function nomeDeUrl(u){
  try{ return decodeURIComponent(new URL(u).pathname.split("/").pop()) || u; }
  catch{ return u; }
}

async function listarGitHub(owner, repo, branch, path){
  const base = `https://api.github.com/repos/${owner}/${repo}/contents`;
  const api = path ? `${base}/${path}?ref=${branch}` : `${base}?ref=${branch}`;
  const r = await fetch(api);
  if(!r.ok) throw new Error(`GitHub API HTTP ${r.status} (${api})`);
  const arr = await r.json();
  if(!Array.isArray(arr)) throw new Error("O link do GitHub não aponta para uma pasta.");
  return arr.filter(x => x.type === "file" && ehPdf(x.name)).map(x => x.download_url);
}

// Recebe uma linha (URL) e devolve uma lista de URLs de PDF
async function resolverLink(line){
  // Pasta do GitHub: .../tree/<branch>[/<path>]
  const gh = line.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/tree\/([^/]+)(?:\/(.+))?\/?$/);
  if(gh){
    const [, owner, repo, branch, path = ""] = gh;
    return listarGitHub(owner, repo, branch, path.replace(/\/$/, ""));
  }
  // Link direto para um PDF
  if(ehPdf(line)) return [line];
  // Caso geral: tenta abrir como página HTML e extrair links .pdf
  const r = await fetch(line);
  if(!r.ok) throw new Error(`HTTP ${r.status} em ${line}`);
  const html = await r.text();
  const doc = new DOMParser().parseFromString(html, "text/html");
  const hrefs = [...doc.querySelectorAll("a[href]")].map(a => a.getAttribute("href"));
  const pdfs = hrefs.filter(ehPdf).map(h => { try{ return new URL(h, line).href; }catch{ return null; } });
  return [...new Set(pdfs.filter(Boolean))];
}

// --- UI ---
const drop = document.getElementById("drop");
const input = document.getElementById("input");
const filesEl = document.getElementById("files");
const urlsEl = document.getElementById("urls");
const goBtn = document.getElementById("go");
const goUrlBtn = document.getElementById("goUrl");
const txtBtn = document.getElementById("txt");
const csvBtn = document.getElementById("csv");
const clearBtn = document.getElementById("clear");

function setStatus(s){ document.getElementById("status").textContent = s; }
function setFiles(list){
  selectedFiles = [...list].filter(f => f.name.toLowerCase().endsWith(".pdf"));
  filesEl.textContent = selectedFiles.length
    ? selectedFiles.map(f => f.name).join("  •  ")
    : "";
  goBtn.disabled = selectedFiles.length === 0;
}

drop.addEventListener("click", () => input.click());
input.addEventListener("change", e => setFiles(e.target.files));
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add("hover");
}));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove("hover");
}));
drop.addEventListener("drop", e => setFiles(e.dataTransfer.files));

// Executa a análise sobre uma lista de fontes [{name, load}]
async function run(sources){
  goBtn.disabled = true; goUrlBtn.disabled = true; txtBtn.disabled = csvBtn.disabled = true;
  document.getElementById("report").innerHTML = "";
  try{
    if(!sources.length){ setStatus("Nada para processar."); return; }
    resultado = await processar(sources);
    render(resultado);
    setStatus(`✅ Relatório gerado de ${sources.length} arquivo(s).`);
    txtBtn.disabled = csvBtn.disabled = false;
  }catch(err){
    setStatus("Erro: " + err.message);
    console.error(err);
  }finally{
    goBtn.disabled = selectedFiles.length === 0; goUrlBtn.disabled = false;
  }
}

goBtn.addEventListener("click", () =>
  run(selectedFiles.map(file => ({ name: file.name, load: () => file.arrayBuffer() }))));

goUrlBtn.addEventListener("click", async () => {
  const linhas = urlsEl.value.split("\n").map(s => s.trim()).filter(Boolean);
  if(!linhas.length){ setStatus("Cole ao menos um link."); return; }
  goUrlBtn.disabled = true; setStatus("Resolvendo links…");
  let urls = [];
  try{
    for(const linha of linhas) urls.push(...await resolverLink(linha));
  }catch(err){
    setStatus("Erro ao resolver link: " + err.message +
      "  (o servidor pode bloquear acesso externo — CORS).");
    goUrlBtn.disabled = false; return;
  }
  urls = [...new Set(urls)];
  if(!urls.length){ setStatus("Nenhum PDF encontrado nos links informados."); goUrlBtn.disabled = false; return; }
  setStatus(`${urls.length} PDF(s) encontrado(s). Baixando…`);
  const sources = urls.map(u => ({
    name: nomeDeUrl(u),
    load: async () => {
      const r = await fetch(u);
      if(!r.ok) throw new Error(`HTTP ${r.status} ao baixar ${u}`);
      return await r.arrayBuffer();
    }
  }));
  run(sources);
});

txtBtn.addEventListener("click", () => baixar("relatorio_producao.txt", gerarTXT(resultado), "text/plain"));
csvBtn.addEventListener("click", () => baixar("relatorio_producao.csv", gerarCSV(resultado), "text/csv"));
clearBtn.addEventListener("click", () => {
  setFiles([]); urlsEl.value = ""; resultado = null; setStatus("");
  document.getElementById("report").innerHTML = "";
  txtBtn.disabled = csvBtn.disabled = true;
  atualizarBarra();
});
</script>
</body>
</html>
